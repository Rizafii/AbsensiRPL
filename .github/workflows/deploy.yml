name: Deploy Laravel to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node (sesuai server: v20)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install & build Vite
      - name: Install Dependencies & Build Frontend
        run: |
          npm install
          npm run build

      # 4. Setup PHP (sesuai server: 8.3)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, bcmath, pdo, mysql
          tools: composer

      # 5. Install Composer (production)
      - name: Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader

      # 6. Optional: bersihin file yang gak perlu
      - name: Cleanup unnecessary files
        run: |
          rm -rf node_modules
          rm -rf tests
          rm -rf .git

      # 7. 🚀 Deploy ke Hostinger via FTP
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v3.1.1
        with:
          server: 145.223.108.5
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: /domains/sihadir.smkn6solo.sch.id/AbsensiRPL/
          exclude: |
            **/.git*
            **/.env
            **/node_modules/**
            **/tests/**
            **/storage/logs/**
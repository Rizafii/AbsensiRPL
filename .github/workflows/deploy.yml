name: Deploy Laravel (First Deploy - Force)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer

      - name: Install Composer
        run: composer install --no-dev --optimize-autoloader

      - name: Cleanup
        run: |
          rm -rf node_modules
          rm -rf tests
          rm -rf .git

      - name: 🚀 Deploy (FORCE)
        uses: SamKirkland/FTP-Deploy-Action@v3.1.1
        with:
          ftp-server: 145.223.108.5
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          git-ftp-args: >
            --remote-root /domains/sihadir.smkn6solo.sch.id/AbsensiRPL/
            --auto-init
            --force
            --exclude-glob .git*
            --exclude-glob .env
            --exclude-glob node_modules/**
            --exclude-glob tests/**
            --exclude-glob storage/logs/**
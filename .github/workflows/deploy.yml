name: Deploy Laravel (NORMAL)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      - name: Install Composer
        run: composer install --no-dev --optimize-autoloader

      - name: Cleanup
        run: |
          rm -rf node_modules
          rm -rf tests
          rm -rf .git

      - name: 🚀 Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5   # ✅ Versi terbaru
        with:
          server: 145.223.108.5                       # ✅ Bukan ftp_server
          username: ${{ secrets.FTP_USERNAME }}       # ✅ Bukan ftp_username
          password: ${{ secrets.FTP_PASSWORD }}       # ✅ Bukan ftp_password
          port: 21
          protocol: ftp                               # ✅ Bukan method
          local-dir: ./                               # ✅ Bukan local_dir
          server-dir: /home/u611758919/domains/sihadir.smkn6solo.sch.id/AbsensiRPL/  # ✅ Bukan remote_dir
          exclude: |                                  # ✅ Format exclude berbeda
            **/.git*
            **/.env
            **/node_modules/**
            **/tests/**
            **/storage/logs/**